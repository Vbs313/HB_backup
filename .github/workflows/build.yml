name: Build HB_backup Plugins

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore NuGet packages
      run: dotnet restore CompilingDLLs.sln

    - name: Build (Release|x86)
      run: dotnet build CompilingDLLs.sln -c Release --no-restore

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: HB_backup-Plugins
        path: CompiledAssemblies\*.dll
